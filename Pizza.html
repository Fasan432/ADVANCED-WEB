<!DOCTYPE html>
<html>
<head>
    <title>Pizza Order Form</title>
</head>
<body style="background:#e6e6e6; font-family: Arial;">

<fieldset>
<legend align="center">PIZZA ORDER FORM</legend>

<form style="width:70%; margin:auto; background:#d9d9d9; padding:15px; border:1px solid #999;">

<!-- Delivery Address -->
<fieldset>
<legend>Delivery Address</legend>

<table width="100%">
<tr>
    <td>Full Name:</td>
    <td><input type="text" placeholder="Full Name"></td>

    <td>Street Address:</td>
    <td><input type="text" placeholder="Address"></td>
</tr>

<tr>
    <td>Phone:</td>
    <td><input type="text" placeholder="Phone"></td>

    <td>Email:</td>
    <td><input type="email" placeholder="Email"></td>
</tr>

<tr>
    <td>Password:</td>
    <td><input type="password" placeholder="Password"></td>
</tr>
</table>

</fieldset>

<br>

<!-- Payment Information -->
<fieldset>
<legend>Payment Information</legend>

<table width="100%">
<tr>
    <td>Card Type:</td>
    <td>
        <select>
            <option>Visa</option>
            <option>Mastercard</option>
            <option>Discover</option>
        </select>
    </td>

    <td>Card Number:</td>
    <td><input type="text" placeholder="Card Number"></td>
</tr>

<tr>
    <td>Name on Card:</td>
    <td><input type="text" placeholder="Name"></td>
</tr>
</table>

</fieldset>

<br>

<!-- Customize Pizza -->
<fieldset>
<legend>Customize Your Pizza</legend>

<table width="100%">
<tr>
    <td>Pizza size :</td>
    <td>
        <select>
            <option selected>large</option>
            <option>medium</option>
            <option>small</option>
        </select>
    </td>

    <td>Quantity:</td>
    <td><input type="number"></td>
</tr>

<tr>
    <td>Spices :</td>
    <td colspan="3">
        Black pepper <input type="checkbox">
        Bell peppers <input type="checkbox">
        mayonnaise <input type="checkbox">
    </td>
</tr>

<tr>
    <td>Other Requirements:</td>
    <td>
        <textarea rows="3" cols="25">Any Other Requirements</textarea>
    </td>

    <td>Meat</td>
    <td>
        Fish <input type="radio" name="meat">
        Cow <input type="radio" name="meat">
        Chicken <input type="radio" name="meat">
    </td>
</tr>
</table>

</fieldset>

<br>

<input type="reset" value="Clear Order">
<input type="submit" value="Place Order">

</fieldset>

</form>

</body>
</html>
